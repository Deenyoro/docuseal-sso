name: Build & push DocuSeal SSO image

# Auto-builds the SSO image (user roles, company logo, email reminders, SAML
# SSO) on every push to the default branch (including when you "Sync fork"
# from upstream DocuSeal), on manual dispatch, and weekly as a safety rebuild.
# Pushes to GitHub Container Registry (GHCR).
#
# Zero-touch fork-sync design — a sync must never leave a red build:
#   1. The housekeeping job auto-disables any workflow not on the keep list,
#      so workflows upstream adds in the future can never fail on the fork.
#   2. sso/script/heal-patches.sh re-anchors drifted sso/patches/ diffs with
#      git apply --3way, regenerates them and pushes the refresh back.
#   3. The overlay + patches are applied to the CHECKOUT and the image is
#      built with upstream's own Dockerfile — upstream Dockerfile changes
#      (base image bumps, new runtime deps, pdfium sources, …) flow through
#      automatically instead of drifting against a forked copy.
on:
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
      - "sso/deploy/**"
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

concurrency:
  group: docuseal-sso-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  housekeeping:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Disable foreign workflows
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Upstream's ci.yml/docker.yml only re-test the pristine upstream
          # tree (the overlay is applied at image build, which fail-louds on
          # its own) — they can go red purely from upstream's state, so they
          # are disabled along with anything else upstream ships or adds.
          keep=".github/workflows/docuseal-sso-build.yml .github/workflows/sync-canary.yml"
          gh api "repos/${{ github.repository }}/actions/workflows" --paginate \
            -q '.workflows[] | [(.id|tostring), .state, .path] | @tsv' |
          while IFS=$'\t' read -r id state path; do
            case " $keep " in
              *" $path "*) continue ;;
            esac
            if [ "$state" = "active" ]; then
              echo "Disabling foreign workflow: $path"
              gh api -X PUT "repos/${{ github.repository }}/actions/workflows/$id/disable"
            fi
          done

  build:
    # Self-hosted runner scale set in the AG-Talos cluster
    # (helmrelease at kubernetes/apps/github/actions-runner-controller/
    # runner-scale-sets/docuseal-sso/). The runner pod is ephemeral
    # with an 80 GiB Ceph RBD volume mounted at /var/lib/docker for DinD.
    runs-on: docuseal-sso
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so heal-patches.sh can 3-way re-anchor drifted
          # patches against their pre-image blobs.
          fetch-depth: 0

      - name: Self-heal drifted SSO patches
        env:
          HEAL_PUSH_BRANCH: ${{ github.ref_type == 'branch' && github.ref_name || '' }}
        run: bash sso/script/heal-patches.sh

      - name: Apply SSO overlay + patches to the build context
        # Hermetic toolbox container — the runner image itself is not
        # guaranteed to ship patch/rsync.
        run: |
          docker run --rm -v "$PWD:/src" -w /src alpine:3 \
            sh -c 'apk add -q --no-cache bash patch rsync findutils \
                   && bash sso/script/apply-overlay.sh \
                   && bash sso/script/apply-patches.sh'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name and version
        id: vars
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "image=${REGISTRY}/${owner}/docuseal-sso" >> "$GITHUB_OUTPUT"
          echo "tag=$(date +%Y.%m.%d)-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.vars.outputs.tag }}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # Upstream's own Dockerfile, against the overlaid+patched checkout.
          file: ./Dockerfile
          push: true
          # arm64 builds via QEMU are slow; add linux/arm64 here if you need it.
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          {
            echo "### DocuSeal SSO image pushed"
            echo ""
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
